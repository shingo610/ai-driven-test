      const box = 'h-[140px] w-full md:h-[168px]';

          const x1 = cx + (r - 4) * Math.cos(ang);
          const y1 = cy + (r - 4) * Math.sin(ang);
          const x2 = cx + r * Math.cos(ang);
          const y2 = cy + r * Math.sin(ang);

        const hy2 = cy + 22 * Math.sin(hAng);

    function parsePercent(rateStr) {
      return parseFloat(String(rateStr).replace(/%/g, '')) || 0;
    }

    /** 達成率: 50%以下=赤、50%超〜100%未満=黄、100%以上=緑（100%超えもあり得る） */
    function rateToneClass(rateStr) {
      const n = parsePercent(rateStr);
      if (n <= 50) return 'text-red-400';
      if (n < 100) return 'text-amber-300';
      return 'text-emerald-400';
    }

    /** 千円単位の数値（+1,200千円 / -300千円） */
    function parseProgressSenen(str) {
      const s = String(str).trim();
      const neg = /^[-−]/.test(s);
      const num = s
        .replace(/^[-+−]/, '')
        .replace(/,/g, '')
        .replace(/千円/g, '')
        .trim();
      const v = parseFloat(num) || 0;
      return neg ? -v : v;
    }

    /**
     * 昨日からの営業進捗（千円）
     * 個人: マイナス or 500以下=赤、500超〜1000以下=黄、1000超=緑
     * 課全体: 閾値10倍（5000 / 10000）
     */
    function progressToneClass(progressStr, isTeam) {
      const v = parseProgressSenen(progressStr);
      const redMax = isTeam ? 5000 : 500;
      const yellowMax = isTeam ? 10000 : 1000;
      if (v < 0 || v <= redMax) return 'text-red-400';
      if (v <= yellowMax) return 'text-amber-300';
      return 'text-emerald-400';
    }

    /**
     * セールスレポート件数
     * 個人: 0=赤、1〜5=黄、6以上=緑
     * 課全体: 0=赤、1〜50=黄、60以上=緑（5件・6件の10倍）
     */
    function reportsToneClass(reportsStr, isTeam) {
      const n = parseInt(String(reportsStr).replace(/件/g, ''), 10);
      const count = Number.isFinite(n) ? n : 0;
      const yellowMax = isTeam ? 50 : 5;
      const greenMin = isTeam ? 60 : 6;
      if (count === 0) return 'text-red-400';
      if (count < greenMin) return 'text-amber-300';
      return 'text-emerald-400';
    }

    function rateHex(rateStr) {
      const n = parsePercent(rateStr);
      if (n <= 50) return '#f87171';
      if (n < 100) return '#fcd34d';
      return '#34d399';
    }

    function rateOver100(rateStr) {
      return parsePercent(rateStr) > 100;
    }

    /** 達成率の高い順（同率は名前順）で上位 n 名 */
    function membersByRateTop(members, n = 5) {
      return [...members]
        .map((m) => ({ m, r: parsePercent(m.rate) }))
        .sort((a, b) => {
          if (b.r !== a.r) return b.r - a.r;
          return a.m.name.localeCompare(b.m.name, 'ja');
        })
        .slice(0, n);
    }

    function SlackRateTop5({ members }) {
      const top = membersByRateTop(members, 5);
      if (top.length === 0) return null;
      return (
        <div className="mt-2 rounded-lg border border-slate-800 bg-slate-900/50 px-2 py-1.5 sm:py-1">
          <div className="mb-1 text-xs font-bold text-sky-300 sm:text-[10px]">達成率TOP5</div>
          <ul className="space-y-0.5 text-xs leading-snug text-slate-200 sm:text-[10px] sm:leading-tight">
            {top.map((row, i) => (
              <li key={row.m.name} className="flex items-baseline justify-between gap-2">
                <span className="shrink-0 text-slate-400">{i + 1}位</span>
                <span className="min-w-0 flex-1 font-semibold text-slate-100">{row.m.name}</span>
                <span className={`shrink-0 text-right ${rateToneClass(row.m.rate)}`}>{row.m.rate}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function SlackVerticalBarFill({ pct, fill, barW = 12, barH = 36 }) {
      const p = Math.min(100, Math.max(0, pct));
      const bh = (p / 100) * barH;
      const y = barH - bh;
      return (
        <svg width={barW} height={barH} viewBox={`0 0 ${barW} ${barH}`} className="shrink-0 rounded-sm">
          <rect x="0" y="0" width={barW} height={barH} fill="#334155" rx="2" />
          <rect x="0" y={y} width={barW} height={bh} fill={fill} rx="2" />
        </svg>
      );
    }

    function slackProgressPctFill(progressStr, isTeam) {
      const v = parseProgressSenen(progressStr);
      const cap = isTeam ? 12000 : 1200;
      let pct = 0;
      let fill = '#64748b';
      if (v < 0) {
        pct = 0;
        fill = '#64748b';
      } else {
        pct = Math.min(100, (v / cap) * 100);
        if (v <= (isTeam ? 5000 : 500)) fill = '#f87171';
        else if (v <= (isTeam ? 10000 : 1000)) fill = '#fcd34d';
        else fill = '#34d399';
      }
      return { pct, fill };
    }

    function slackReportsPctFill(reportsStr, isTeam) {
      const n = parseInt(String(reportsStr).replace(/件/g, ''), 10) || 0;
      const cap = isTeam ? 80 : 10;
      const pct = Math.min(100, (n / cap) * 100);
      let fill = '#f87171';
      if (n >= (isTeam ? 60 : 6)) fill = '#34d399';
      else if (n > 0) fill = '#fcd34d';
      return { pct, fill };
    }

    /** 達成率の数値の右に円グラフ（100%超はドーナツ横に✨） */
    function SlackRateRowWithDonut({ rateStr }) {
      const tone = rateToneClass(rateStr);
      const sparkle = rateOver100(rateStr);
      return (
        <div className="flex items-center justify-between gap-2 border-b border-slate-800/80 py-1 sm:py-0.5">
          <span className="max-w-[45%] shrink-0 text-xs leading-snug text-slate-400 sm:max-w-[52%] sm:text-[10px] sm:leading-tight">
            達成率
          </span>
          <div className="flex min-w-0 items-center justify-end gap-1">
            <span className={`shrink-0 text-right text-sm font-semibold leading-snug sm:text-[11px] ${tone}`}>
              {rateStr}
            </span>
            <SlackTeamDonut rateStr={rateStr} />
            {sparkle ? (
              <span className="shrink-0 text-base leading-none sm:text-sm" title="予算達成率100%超" aria-label="予算達成率100%超">
                ✨
              </span>
            ) : null}
          </div>
        </div>
      );
    }

    /** SR0件連続日数の接尾辞（consecutiveZeroReportDays は土日・祝日を除く営業日ベースの集計結果を想定） */
    function slackSrZeroStreakSuffix(reportsStr, consecutiveZeroReportDays) {
      const n = parseInt(String(reportsStr).replace(/件/g, ''), 10);
      if (Number.isNaN(n) || n !== 0) return null;
      const days = consecutiveZeroReportDays ?? 0;
      if (days < 1) return null;
      return `※${days}日目連続`;
    }

    /** 数値の右に縦棒（進捗 or SR） */
    function SlackMetricLineWithBar({ label, value, valueClassName, pct, fill, barCaption, valueSuffix }) {
      const valueCls = valueClassName ? `font-semibold ${valueClassName}` : 'font-semibold text-slate-50';
      const barH = 32;
      const barW = 10;
      return (
        <div className="flex items-end justify-between gap-2 border-b border-slate-800/80 py-1 last:border-b-0 sm:gap-1.5 sm:py-0.5">
          <span className="max-w-[48%] shrink-0 text-xs leading-snug text-slate-400 sm:max-w-[46%] sm:text-[10px] sm:leading-tight">
            {label}
          </span>
          <div className="flex items-end gap-1.5">
            <span
              className={`max-w-[min(7.5rem,38vw)] text-right text-sm leading-snug break-all sm:max-w-[5.5rem] sm:text-[11px] sm:leading-tight ${valueCls}`}
            >
              {value}
              {valueSuffix ? (
                <span className="ml-1 block text-[10px] font-normal leading-snug text-slate-400 sm:inline sm:text-[9px] sm:leading-tight">
                  {valueSuffix}
                </span>
              ) : null}
            </span>
            <div className="flex flex-col items-center gap-0.5" aria-hidden="true">
              <SlackVerticalBarFill pct={pct} fill={fill} barW={barW} barH={barH} />
              <span className="text-[9px] font-semibold leading-none text-slate-500 sm:text-[8px]">{barCaption}</span>
            </div>
          </div>
        </div>
      );
    }

    function SlackFlowDiagram() {
      const steps = ['SF取得', '集計', 'slack投稿'];
      return (
        <div className="mb-2 flex items-stretch gap-0.5 rounded-md border border-slate-700/90 bg-slate-900/95 px-1 py-1.5">
          {steps.map((label, i) => (
            <Fragment key={label}>
              {i > 0 ? (
                <span
                  className="flex items-center text-xs leading-none text-slate-600 sm:text-[8px]"
                  aria-hidden="true"
                >
                  →
                </span>
              ) : null}
              <div className="flex flex-1 items-center justify-center rounded bg-slate-800/90 px-1 py-1.5 text-center text-xs font-medium leading-tight text-sky-200 sm:px-0.5 sm:py-1 sm:text-[10px]">
                {label}
              </div>
            </Fragment>
          ))}
        </div>
      );
    }

    function SlackTeamDonut({ rateStr }) {
      const raw = parsePercent(rateStr);
      const p = Math.min(100, Math.max(0, raw));
      const r = 14;
      const c = 2 * Math.PI * r;
      const dash = (p / 100) * c;
      const color = rateHex(rateStr);
      const label = Math.round(raw);
      const fs = raw > 100 ? 7.5 : 9;
      return (
        <svg width="36" height="36" viewBox="0 0 36 36" className="shrink-0" aria-hidden="true">
          <circle cx="18" cy="18" r={r} fill="none" stroke="#334155" strokeWidth="5" />
          <circle
            cx="18"
            cy="18"
            r={r}
            fill="none"
            stroke={color}
            strokeWidth="5"
            strokeDasharray={`${dash} ${c}`}
            strokeLinecap="round"
            transform="rotate(-90 18 18)"
          />
          <text x="18" y="19" textAnchor="middle" fontSize={fs} fill="#e2e8f0" fontWeight="700">
            {label}
          </text>
        </svg>
      );
    }

    /** セールスレポートが4日以上連続0件のメンバー（consecutiveZeroReportDays は土日・祝日を除く営業日の集計結果を想定） */
    function SlackZeroReportStreakAlert({ members }) {
      const flagged = members.filter((m) => (m.consecutiveZeroReportDays ?? 0) >= 4);
      return (
        <div className="mt-2 rounded-md border border-rose-900/60 bg-rose-950/35 px-2 py-2 sm:py-1.5">
          <div className="mb-1 text-xs font-bold leading-snug text-rose-200 sm:text-[11px]">4日以上SR0件（要フォロー）</div>
          {flagged.length === 0 ? (
            <p className="text-xs leading-relaxed text-slate-500 sm:text-[11px] sm:leading-snug">該当者なし</p>
          ) : (
            <ul className="space-y-1 sm:space-y-0.5">
              {flagged.map((m) => (
                <li key={m.name} className="text-xs leading-relaxed text-rose-100 sm:text-[11px] sm:leading-snug">
                  <span className="font-semibold text-rose-50">{m.name}</span>
                  <span className="text-rose-200/90">（{m.consecutiveZeroReportDays}日連続・0件）</span>
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    }

    /** 昨日からの営業進捗金額が7日以上変わっていないメンバー（集計結果を想定） */
    function SlackNoAbProgressChangeAlert({ members }) {
      const flagged = members.filter((m) => (m.consecutiveNoAbProgressChangeDays ?? 0) >= 7);
      return (
        <div className="mt-2 rounded-md border border-amber-900/55 bg-amber-950/35 px-2 py-2 sm:py-1.5">
          <div className="mb-1 text-xs font-bold leading-snug text-amber-200 sm:text-[11px]">
            7日以上営業進捗に変化なし（要フォロー）
          </div>
          {flagged.length === 0 ? (
            <p className="text-xs leading-relaxed text-slate-500 sm:text-[11px] sm:leading-snug">該当者なし</p>
          ) : (
            <ul className="space-y-1 sm:space-y-0.5">
              {flagged.map((m) => (
                <li key={m.name} className="text-xs leading-relaxed text-amber-100 sm:text-[11px] sm:leading-snug">
                  <span className="font-semibold text-amber-50">{m.name}</span>
                  <span className="text-amber-200/90">（{m.consecutiveNoAbProgressChangeDays}日間同額）</span>
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    }

    /** スマホ1画面に課全体＋個人4名程度が入るよう、1行ラベル＋数値で詰める */
    function SlackMetricLine({ label, value, valueClassName }) {
      const valueCls = valueClassName ? `font-semibold ${valueClassName}` : 'font-semibold text-slate-50';
      return (
        <div className="flex items-baseline justify-between gap-2 border-b border-slate-800/80 py-1 last:border-b-0 sm:gap-1.5 sm:py-0.5">
          <span className="max-w-[55%] shrink-0 text-xs leading-snug text-slate-400 sm:max-w-[52%] sm:text-[10px] sm:leading-tight">
            {label}
          </span>
          <span
            className={`min-w-0 text-right text-sm leading-snug break-all sm:text-[11px] sm:leading-tight ${valueCls}`}
          >
            {value}
          </span>
        </div>
      );
    }

    function SlackMemberBlock({ member }) {
      const progFill = slackProgressPctFill(member.progress, false);
      const repFill = slackReportsPctFill(member.reports, false);
      const srStreak = slackSrZeroStreakSuffix(member.reports, member.consecutiveZeroReportDays);
      return (
        <div className="rounded-lg border border-slate-800 bg-slate-900/70 px-2 py-1.5 sm:py-1">
          <div className="mb-0.5 border-b border-slate-700 pb-1 text-sm font-bold leading-tight text-slate-50 sm:pb-0.5 sm:text-xs sm:leading-none">
            {member.name}
          </div>
          <SlackMetricLine label="営業数値" value={member.es} />
          <SlackRateRowWithDonut rateStr={member.rate} />
          <SlackMetricLineWithBar
            label="昨日からの営業進捗"
            value={member.progress}
            valueClassName={progressToneClass(member.progress, false)}
            pct={progFill.pct}
            fill={progFill.fill}
            barCaption="進捗"
          />
          <SlackMetricLineWithBar
            label="SR件数(昨日)"
            value={member.reports}
            valueClassName={reportsToneClass(member.reports, false)}
            pct={repFill.pct}
            fill={repFill.fill}
            barCaption="SR"
            valueSuffix={srStreak}
          />
        </div>
      );
    }

    function SlackReportScroll({ data }) {
      const t = data.team;
      const teamSrStreak = slackSrZeroStreakSuffix(t.reports, t.consecutiveZeroReportDays);

      return (
        <div className="h-[min(62vh,620px)] overflow-y-auto overscroll-y-contain px-3 py-2.5 font-sans sm:h-[min(58vh,580px)] sm:px-2.5 sm:py-2">
          <SlackFlowDiagram />
          <div className="text-base font-bold leading-snug text-slate-50 sm:text-sm sm:leading-tight">
            【{data.date} 朝レポート】
          </div>
          <div className="mt-2 rounded-lg border border-slate-800 bg-slate-900/60 px-2 py-1.5 sm:py-1">
            <div className="mb-1 text-xs font-bold text-sky-300 sm:mb-0.5 sm:text-[10px]">課全体</div>
            <SlackMetricLine label="営業数値" value={t.es} />
            <SlackRateRowWithDonut rateStr={t.rate} />
            <SlackMetricLineWithBar
              label="昨日からの営業進捗"
              value={t.progress}
              valueClassName={progressToneClass(t.progress, true)}
              {...slackProgressPctFill(t.progress, true)}
              barCaption="進捗"
            />
            <SlackMetricLineWithBar
              label="SR件数(昨日)"
              value={t.reports}
              valueClassName={reportsToneClass(t.reports, true)}
              {...slackReportsPctFill(t.reports, true)}
              barCaption="SR"
              valueSuffix={teamSrStreak}
            />
          </div>
          <SlackRateTop5 members={data.members} />
          <SlackZeroReportStreakAlert members={data.members} />
          <SlackNoAbProgressChangeAlert members={data.members} />
          <div className="mt-2 text-[10px] font-bold text-sky-300">個人別</div>
          <div className="mt-1 flex flex-col gap-1">
            {data.members.map((m) => (
              <SlackMemberBlock key={m.name} member={m} />
            ))}
          </div>
          <div className="mt-2 rounded-md bg-slate-900/80 px-2 py-2 text-xs leading-relaxed text-slate-400 sm:py-1.5 sm:text-[10px] sm:leading-snug sm:text-slate-500">
            <div>※A＝契約書手交</div>
            <div>※B＝口頭受注</div>
          </div>
        </div>
      );
    }

    function SlackPhoneFrame({ children }) {
      return (
        <div className="w-full max-w-[300px]">
          <div className="w-full rounded-[1.75rem] border-[8px] border-slate-900 bg-slate-900 shadow-xl ring-1 ring-slate-950/40">
            <div className="overflow-hidden rounded-[1.1rem] bg-slate-950">
              <div className="flex justify-center bg-slate-950 pt-1.5">
                <span className="h-0.5 w-8 rounded-full bg-slate-700" aria-hidden="true" />
              </div>
              <div className="border-b border-slate-800 px-3 py-2 sm:px-2.5 sm:py-1.5">
                <div className="text-xs font-semibold text-slate-400 sm:text-[10px]"># 課専用チャネル</div>
              </div>
              {children}
            </div>
          </div>
        </div>
      );
    }

    function SlackPreview({ data }) {
      return (
        <div className="flex w-full flex-col items-center">
          <p className="mb-4 max-w-md px-1 text-center text-sm leading-relaxed text-slate-600 sm:text-xs sm:text-slate-500">
            下の枠はスマホでのSlack表示イメージです（実機幅に近いサイズ）。
          </p>
          <SlackPhoneFrame>
            <SlackReportScroll data={data} />
          </SlackPhoneFrame>
        </div>
      );
    }

    function ABProgressReportToolOverview() {
      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 p-4 sm:p-6 md:p-10">
          <div className="mx-auto max-w-6xl space-y-6 sm:space-y-8">
            <section className="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6 md:p-10">
              <div className="inline-flex rounded-full bg-slate-100 px-3 py-1 text-sm font-medium text-slate-700 sm:px-4">
                Tailwind CSS 版
              </div>
              <h1 className="mt-4 text-2xl font-bold tracking-tight sm:text-3xl md:text-5xl">
                予算進捗自動slackレポート
              </h1>
              <p className="mt-4 max-w-4xl text-lg leading-relaxed text-slate-600 sm:text-base sm:leading-8 md:text-lg">
                毎朝8時にSalesforceのデータを取得し、課全体と個人別の予算に対する進捗（数値・達成率など）を集計して、
                slackの課専用チャネルへ自動投稿するツール。
              </p>
              <div className="mt-4 max-w-4xl rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-base leading-relaxed text-slate-700 sm:text-sm">
                <p className="font-semibold text-slate-800">提出課題の流れに沿った構成：</p>
                <div className="mt-2 flex flex-col gap-2 md:hidden">
                  <span className="block font-semibold text-emerald-800">①完成イメージの図解（必須）</span>
                  <span className="block font-semibold text-sky-800">②4つのパーツに分類（任意）</span>
                  <span className="block font-semibold text-violet-800">③3つのコツの活用（任意）</span>
                </div>
                <div className="mt-2 hidden flex-wrap items-center gap-x-1.5 gap-y-2 leading-relaxed md:flex">
                  <span className="font-semibold text-emerald-800">①完成イメージの図解（必須）</span>
                  <span className="shrink-0 text-slate-400" aria-hidden="true">
                    →
                  </span>
                  <span className="font-semibold text-sky-800">②4つのパーツに分類（任意）</span>
                  <span className="shrink-0 text-slate-400" aria-hidden="true">
                    →
                  </span>
                  <span className="font-semibold text-violet-800">③3つのコツの活用（任意）</span>
                </div>
              </div>
            </section>

            <SectionCard
              taskTheme={1}
              badge="課題①（必須）"
              title="①完成イメージの図解（必須）"
              description="slackに届く最終表示をスマホ幅で再現しています。流れ図・各数値の右横に達成率ドーナツと進捗・SRの縦棒、フォローが必要なメンバーの抽出まで含みます。"
            >
              <SlackPreview data={slackSampleData} />
            </SectionCard>

            <FourPartsInfographic />

            <SectionCard
              taskTheme={3}
              badge="課題③（任意）"
              title="③伝わるための3つのコツ（任意）"
              description="コツ①（完成形の絵から作る）は、このページ先頭の「①完成イメージの図解」で実践済みです。以下はコツ②・③と、本HTMLで行った具体例です。"
            >
              <div className="mb-8 rounded-2xl border border-violet-100 bg-violet-50/40 p-4 shadow-sm sm:p-5">
                <h3 className="text-lg font-bold leading-snug text-violet-950 sm:text-base">
                  ChatGPTで相談した流れ（要約）
                </h3>
                <p className="mt-2 text-base leading-relaxed text-slate-600 sm:text-sm">
                  共有スレッド「slackレポート相談」の対話を、提出用に次のように整理しています。
                </p>
                <ol className="mt-4 list-decimal space-y-3 pl-5 text-base leading-relaxed text-slate-700 sm:space-y-2 sm:text-sm sm:leading-relaxed">
                  {chatgptConsultationSummaryItems.map((line) => (
                    <li key={line}>{line}</li>
                  ))}
                </ol>
              </div>
              <div className="grid gap-4 md:grid-cols-2">
                {presentationTips.map((tip) => (
                  <div
                    key={tip.title}
                    className="rounded-2xl border border-violet-100 bg-violet-50/30 p-4 shadow-sm sm:p-5"
                  >
                    <div className="flex h-9 w-9 items-center justify-center rounded-full bg-violet-600 text-base font-bold text-white sm:h-8 sm:w-8 sm:text-sm">
                      {tip.num}
                    </div>
                    <h3 className="mt-3 text-xl font-bold leading-snug text-slate-900 sm:text-lg">{tip.title}</h3>
                    <div className="mt-2 space-y-3 text-base leading-relaxed text-slate-600 sm:text-sm">
                      <p>{tip.intro}</p>
                      <div>
                        <p className="font-semibold text-violet-950">本ページでの実践</p>
                        <ul className="mt-2 list-disc space-y-2.5 pl-5 marker:text-violet-600 sm:space-y-2">
                          {tip.practiceItems.map((item) => (
                            <li key={item}>{item}</li>
                          ))}
                        </ul>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </SectionCard>

            <SectionCard title="処理フロー" description="Salesforceから取得したデータを整理し、Slackへ自動配信する全体像です。">
              <ProcessFlow />
            </SectionCard>

            <SectionCard title="出力内容">
              <div className="grid gap-6 md:grid-cols-2">
                <MetricList title="課全体" items={metricItems} />
                <MetricList title="個人別" items={metricItems} />
              </div>
            </SectionCard>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ABProgressReportToolOverview />);
  </script>
</body>
</html>
