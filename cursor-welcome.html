<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cursorセットアップ完了！</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Noto Sans JP', sans-serif;
      overflow: hidden;
    }

    /* 背景の浮かぶ丸 */
    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }
    .bubble:nth-child(1)  { width: 300px; height: 300px; background: #e040fb; top: -80px;  left: -80px;  animation-delay: 0s; }
    .bubble:nth-child(2)  { width: 200px; height: 200px; background: #00e5ff; top: 60%;    right: -60px; animation-delay: 2s; }
    .bubble:nth-child(3)  { width: 150px; height: 150px; background: #69f0ae; bottom: -50px; left: 30%;  animation-delay: 4s; }
    .bubble:nth-child(4)  { width: 100px; height: 100px; background: #ffeb3b; top: 20%;    left: 10%;   animation-delay: 1s; }
    .bubble:nth-child(5)  { width: 120px; height: 120px; background: #ff6e40; bottom: 15%; right: 15%;  animation-delay: 3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    /* カード */
    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      padding: 64px 72px;
      text-align: center;
      max-width: 700px;
      width: 90%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
      animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7) translateY(40px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    /* アイコン */
    .icon {
      font-size: 72px;
      display: block;
      margin-bottom: 24px;
      animation: spin 1s ease-out 0.6s both;
    }

    @keyframes spin {
      from { transform: rotate(-30deg) scale(0); opacity: 0; }
      to   { transform: rotate(0deg)   scale(1); opacity: 1; }
    }

    /* メインタイトル */
    h1 {
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 900;
      background: linear-gradient(90deg, #ff6ec7, #ffe259, #6ef7a7, #6ec6ff, #c084fc);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      line-height: 1.2;
      margin-bottom: 28px;
    }

    @keyframes gradientShift {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }

    /* 区切り線 */
    .divider {
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, #ff6ec7, #6ec6ff);
      border-radius: 2px;
      margin: 0 auto 28px;
      animation: expandWidth 0.8s ease 0.8s both;
    }

    @keyframes expandWidth {
      from { width: 0; opacity: 0; }
      to   { width: 80px; opacity: 1; }
    }

    /* サブメッセージ */
    p {
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.7;
      animation: fadeUp 0.8s ease 1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* バッジ */
    .badge {
      display: inline-block;
      margin-top: 36px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #6ec6ff33, #c084fc33);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      color: #c9d8ff;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      animation: fadeUp 0.8s ease 1.3s both;
    }

    .badge span {
      margin-right: 6px;
    }

    .dev-hint {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.92);
      border-top: 1px solid rgba(148, 163, 184, 0.35);
      color: #e2e8f0;
      font-size: 0.8rem;
      line-height: 1.5;
      text-align: center;
      z-index: 10;
    }
    .dev-hint code {
      background: rgba(51, 65, 85, 0.8);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.78rem;
    }
    .dev-hint a {
      color: #7dd3fc;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>
</head>
<body>

  <!-- 背景バブル -->
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <!-- メインカード -->
  <div class="card">
    <span class="icon">🚀</span>
    <h1>Cursorセットアップ完了！</h1>
    <div class="divider"></div>
    <p>AIと一緒にものづくりを始める準備ができました</p>
    <div class="badge"><span>✨</span> Let's build something amazing!</div>
  </div>

  <aside class="dev-hint" lang="ja">
    <strong>営業報告のデモ画面</strong>はこのページではありません。プロジェクト直下でターミナルを開き
    <code>npm run web:dev</code>
    を実行してから、ブラウザで
    <a href="http://localhost:5180/sales-report" target="_blank" rel="noopener noreferrer">http://localhost:5180/sales-report</a>
    を開いてください（ポートが埋まっている場合はターミナル表示の URL に従ってください）。
  </aside>

</body>
</html>
